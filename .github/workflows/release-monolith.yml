name: Release monolith (GHCR + Docker Hub)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to release (e.g. v1.1.1)
        required: true

permissions:
  contents: read
  packages: write
  # Required for cosign keyless signing via the workflow's OIDC token.
  id-token: write
  # Required to push SLSA provenance attestations alongside the image.
  attestations: write

concurrency:
  group: release-monolith-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Compute version
        id: ver
        run: |
          ref="${{ inputs.tag || github.ref_name }}"
          # Strip leading refs/tags/ if present
          ref="${ref#refs/tags/}"
          # Strip leading v
          ver="${ref#v}"
          if [[ ! "$ver" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::tag '$ref' is not a valid semver vX.Y.Z[-pre]"
            exit 1
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "tagref=$ref" >> "$GITHUB_OUTPUT"
          if [[ "$ver" == *"-"* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build tag list
        id: tags
        env:
          # GHCR namespace tracks the GitHub repo owner (dragoshont).
          # Docker Hub namespace is independent and configured here.
          # Override at run time via `gh workflow run release-monolith.yml -f tag=vX.Y.Z`
          # — namespace stays whatever this env says.
          GHCR_NAMESPACE: ${{ github.repository_owner }}
          DOCKERHUB_NAMESPACE: hserver
        run: |
          ver="${{ steps.ver.outputs.version }}"
          {
            echo "tags<<EOF"
            echo "ghcr.io/${GHCR_NAMESPACE}/homelab-mcp:${ver}"
            echo "ghcr.io/${GHCR_NAMESPACE}/homelab-mcp:v${ver}"
            echo "docker.io/${DOCKERHUB_NAMESPACE}/homelab-mcp:${ver}"
            echo "docker.io/${DOCKERHUB_NAMESPACE}/homelab-mcp:v${ver}"
            if [[ "${{ steps.ver.outputs.is_prerelease }}" == "false" ]]; then
              echo "ghcr.io/${GHCR_NAMESPACE}/homelab-mcp:latest"
              echo "docker.io/${DOCKERHUB_NAMESPACE}/homelab-mcp:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push release
        uses: ./.github/actions/build-mcp-image
        with:
          tags: ${{ steps.tags.outputs.tags }}
          push: "true"
          # Multi-arch on releases: linux/amd64 (homelab nodes) +
          # linux/arm64 (Raspberry Pi / Apple Silicon dev machines).
          # Push-to-main builds keep amd64-only for fast iteration.
          platforms: linux/amd64,linux/arm64
          cache-scope: monolith-release
          # Supply-chain hardening: SBOM + SLSA provenance attestations
          # default true; sign with cosign keyless on every release;
          # Trivy gates the build on HIGH/CRITICAL CVEs.
          sign: "true"
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.title=homelab-mcp
            org.opencontainers.image.description=Homelab MCP monolith server (mcpo HTTP bridge over stdio MCP)
